[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_ignores = True
ignore_missing_imports = True

# HA base classes arrive as Any -- subclassing Any is expected
disallow_subclassing_any = False

# Strict checks for our pure-Python core modules
[mypy-custom_components.kwl_fraenkische.coordinator]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.const]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# HA-heavy modules -- relax strict checks where HA types are unresolvable
[mypy-custom_components.kwl_fraenkische.config_flow]
disallow_untyped_defs = False
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.fan]
disallow_untyped_defs = False
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.sensor]
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.select]
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.number]
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.binary_sensor]
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.button]
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.repairs]
warn_return_any = False

[mypy-custom_components.kwl_fraenkische.diagnostics]
warn_return_any = False
